<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 66 1600 792" width="1600" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
      text { font-family: Jost, system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F8F5EE"/>

  <!-- Header band -->
  <rect width="1600" height="66" fill="#EDE8DF"/>
  <text x="90" y="29" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="2">SLIDE 20  ·  GOVERNANCE MATURITY LADDER</text>
  <text x="90" y="52" font-size="17" font-weight="300" fill="#1C1E26">Most teams are at L1 or L2. Moving to L3 is governance work — that is the IM/DM's territory.</text>

  <!-- ═══════════════════════════════════════════════════════════════
       STAIRCASE — 4 equal steps ascending left-to-right
       Canvas area: x=40–1560, y=90–820 → 1520×730px
       Step width: 380px  Step height: 182px
       Tread tops:  L1 y=638  L2 y=456  L3 y=274  L4 y=92
       Risers at x: 40, 420, 800, 1180, 1560
  ════════════════════════════════════════════════════════════════ -->

  <!-- Staircase body -->
  <polygon
    points="40,638 420,638 420,456 800,456 800,274 1180,274 1180,92 1560,92 1560,820 40,820"
    fill="#EDE8DF" stroke="none"/>

  <!-- L3 jade highlight -->
  <polygon
    points="800,274 1180,274 1180,456 800,456"
    fill="#D2EBE2" stroke="none"/>

  <!-- Staircase top-profile outline -->
  <polyline
    points="40,638 420,638 420,456 800,456 800,274 1180,274 1180,92 1560,92"
    fill="none" stroke="#CAC7BF" stroke-width="1.5"/>

  <!-- Outer edges -->
  <line x1="40"   y1="820" x2="1560" y2="820" stroke="#CAC7BF" stroke-width="1"/>
  <line x1="40"   y1="638" x2="40"   y2="820" stroke="#CAC7BF" stroke-width="1"/>
  <line x1="1560" y1="92"  x2="1560" y2="820" stroke="#CAC7BF" stroke-width="1"/>

  <!-- Inner riser lines (step separators) -->
  <line x1="420"  y1="638" x2="420"  y2="820" stroke="#CAC7BF" stroke-width="0.75"/>
  <line x1="800"  y1="456" x2="800"  y2="820" stroke="#CAC7BF" stroke-width="0.75"/>
  <line x1="1180" y1="274" x2="1180" y2="820" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- ═══ LEVEL LABELS — each centered in its step area ═══ -->

  <!-- L1: x=40–420, y=638–820, center (230, 729) -->
  <text x="230" y="706" text-anchor="middle" class="mono" font-size="11" fill="#6A6C7A" letter-spacing="2">L1</text>
  <text x="230" y="736" text-anchor="middle" font-size="22" font-weight="300" fill="#1C1E26">Unseen AI</text>
  <text x="230" y="762" text-anchor="middle" font-size="13" font-weight="300" fill="#6A6C7A">No inventory of agents</text>
  <text x="230" y="793" text-anchor="middle" class="mono" font-size="10" fill="#9AA0A6" letter-spacing="1">← MOST ORGS</text>

  <!-- L2: x=420–800, y=456–638, center (610, 547) -->
  <text x="610" y="515" text-anchor="middle" class="mono" font-size="11" fill="#6A6C7A" letter-spacing="2">L2</text>
  <text x="610" y="545" text-anchor="middle" font-size="22" font-weight="300" fill="#1C1E26">Observed AI</text>
  <text x="610" y="571" text-anchor="middle" font-size="13" font-weight="300" fill="#6A6C7A">Visibility — no control</text>
  <text x="610" y="602" text-anchor="middle" class="mono" font-size="10" fill="#9AA0A6" letter-spacing="1">← MOST ORGS</text>

  <!-- L3: x=800–1180, y=274–456, center (990, 365) — jade (TARGET) -->
  <!-- TARGET badge -->
  <rect x="1088" y="278" width="76" height="22" rx="3" fill="#2E6B4E"/>
  <text x="1126" y="293" text-anchor="middle" class="mono" font-size="9" fill="#F8F5EE" letter-spacing="1.5">TARGET</text>
  <!-- Level content -->
  <text x="990" y="328" text-anchor="middle" class="mono" font-size="11" fill="#2E6B4E" letter-spacing="2">L3</text>
  <text x="990" y="360" text-anchor="middle" font-size="22" font-weight="300" fill="#2E6B4E">Controlled AI</text>
  <text x="990" y="386" text-anchor="middle" font-size="13" font-weight="300" fill="#2E6B4E">Policies enforced, owners assigned</text>
  <!-- Transition note at base of L3 -->
  <text x="990" y="438" text-anchor="middle" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1">assign ownership · design HITL patterns · set escalation thresholds</text>

  <!-- L4: x=1180–1560, y=92–274, center (1370, 183) -->
  <text x="1370" y="152" text-anchor="middle" class="mono" font-size="11" fill="#6A6C7A" letter-spacing="2">L4</text>
  <text x="1370" y="184" text-anchor="middle" font-size="22" font-weight="300" fill="#1C1E26">Autonomous Governance</text>
  <text x="1370" y="210" text-anchor="middle" font-size="13" font-weight="300" fill="#6A6C7A">Agents monitoring agents</text>

  <!-- ═══ Footer ═══ -->
  <line x1="0" y1="858" x2="1600" y2="858" stroke="#CAC7BF" stroke-width="0.5"/>
  <text x="90" y="878" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Framework: VERDICT (practitioner heuristic — useful orientation, not peer-reviewed research)</text>
</svg>
