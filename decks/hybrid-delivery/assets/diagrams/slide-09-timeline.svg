<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
      text { font-family: Jost, system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F8F5EE"/>

  <!-- Header band -->
  <rect width="1600" height="66" fill="#EDE8DF"/>
  <text x="90" y="29" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="2">SLIDE 09  ·  HISTORICAL PATTERN</text>
  <text x="90" y="52" font-size="17" font-weight="300" fill="#1C1E26">Wave 1 happened. The audience lived it. The structural dynamic is repeating.</text>

  <!-- ═══════════════════════════════════════ TIMELINE TRACK ═══════════════════════════════════════ -->

  <!-- Main horizontal timeline line -->
  <line x1="180" y1="420" x2="1420" y2="420" stroke="#CAC7BF" stroke-width="2"/>

  <!-- Arrowhead at right end -->
  <polygon points="1410,413 1430,420 1410,427" fill="#CAC7BF"/>

  <!-- Node 1: 2020–2022 (QE Era) — x=360 -->
  <circle cx="360" cy="420" r="10" fill="#EDE8DF" stroke="#CAC7BF" stroke-width="2"/>
  <text x="360" y="393" text-anchor="middle" class="mono" font-size="13" fill="#6A6C7A" letter-spacing="1.5">2020–2022</text>

  <!-- Node 1 label above line -->
  <text x="360" y="360" text-anchor="middle" font-size="22" font-weight="400" fill="#1C1E26">QE Era</text>
  <line x1="200" y1="376" x2="520" y2="376" stroke="#CAC7BF" stroke-width="0.5"/>

  <!-- Node 1 description below line -->
  <text x="360" y="458" text-anchor="middle" font-size="15" font-weight="300" fill="#6A6C7A">Agile roles proliferate</text>
  <text x="360" y="480" text-anchor="middle" font-size="15" font-weight="300" fill="#6A6C7A">SM training = 49% of</text>
  <text x="360" y="502" text-anchor="middle" font-size="15" font-weight="300" fill="#6A6C7A">industry total</text>
  <text x="360" y="536" text-anchor="middle" font-size="14" font-weight="300" fill="#CAC7BF">Accountability is light.</text>

  <!-- Node 1 stat callout -->
  <rect x="260" y="572" width="200" height="48" rx="4" fill="#EDE8DF"/>
  <text x="360" y="593" text-anchor="middle" class="mono" font-size="11" fill="#2E6B4E" letter-spacing="1">49%</text>
  <text x="360" y="612" text-anchor="middle" class="mono" font-size="9" fill="#6A6C7A" letter-spacing="1">SM TRAINING SHARE</text>

  <!-- Node 2: 2022–2023 (QT Era) — x=800 -->
  <circle cx="800" cy="420" r="10" fill="#EDE8DF" stroke="#CAC7BF" stroke-width="2"/>
  <text x="800" y="393" text-anchor="middle" class="mono" font-size="13" fill="#6A6C7A" letter-spacing="1.5">2022–2023</text>

  <!-- Node 2 label above -->
  <text x="800" y="360" text-anchor="middle" font-size="22" font-weight="400" fill="#1C1E26">QT Era</text>
  <line x1="640" y1="376" x2="960" y2="376" stroke="#CAC7BF" stroke-width="0.5"/>

  <!-- Node 2 description below -->
  <text x="800" y="458" text-anchor="middle" font-size="15" font-weight="300" fill="#6A6C7A">Rates rise. ROI pressure</text>
  <text x="800" y="480" text-anchor="middle" font-size="15" font-weight="300" fill="#6A6C7A">returns. SM enrollment</text>
  <text x="800" y="502" text-anchor="middle" font-size="15" font-weight="300" fill="#6A6C7A">collapses to under 5%</text>
  <text x="800" y="536" text-anchor="middle" font-size="14" font-weight="300" fill="#1C1E26">18% of orgs cut dedicated</text>
  <text x="800" y="556" text-anchor="middle" font-size="14" font-weight="300" fill="#1C1E26">Agile Coach demand</text>

  <!-- Node 2 stat callout -->
  <rect x="700" y="590" width="200" height="48" rx="4" fill="#EDE8DF"/>
  <text x="800" y="611" text-anchor="middle" class="mono" font-size="11" fill="#1C1E26" letter-spacing="1">&lt; 5%</text>
  <text x="800" y="630" text-anchor="middle" class="mono" font-size="9" fill="#6A6C7A" letter-spacing="1">SM TRAINING SHARE</text>

  <!-- Collapse arrow between Node 1 and Node 2 callouts -->
  <line x1="462" y1="596" x2="698" y2="596" stroke="#CAC7BF" stroke-width="1"/>
  <polygon points="688,590 706,596 688,602" fill="#CAC7BF"/>
  <text x="580" y="583" text-anchor="middle" class="mono" font-size="9" fill="#6A6C7A" letter-spacing="1">COLLAPSE</text>

  <!-- Node 3: 2023–2024 (Hybrid roles emerge) — x=1240, jade circle -->
  <circle cx="1240" cy="420" r="12" fill="#2E6B4E" stroke="#2E6B4E" stroke-width="2"/>
  <text x="1240" y="393" text-anchor="middle" class="mono" font-size="13" fill="#2E6B4E" letter-spacing="1.5">2023–2024</text>

  <!-- Node 3 label above -->
  <text x="1240" y="348" text-anchor="middle" font-size="22" font-weight="400" fill="#2E6B4E">Hybrid roles emerge</text>
  <line x1="1060" y1="366" x2="1420" y2="366" stroke="#2E6B4E" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- Node 3 description below -->
  <text x="1240" y="458" text-anchor="middle" font-size="15" font-weight="300" fill="#2E6B4E">Delivery Manager</text>
  <text x="1240" y="480" text-anchor="middle" font-size="15" font-weight="300" fill="#2E6B4E">Iteration Manager</text>
  <text x="1240" y="502" text-anchor="middle" font-size="15" font-weight="300" fill="#2E6B4E">Agile Delivery Lead</text>
  <text x="1240" y="536" text-anchor="middle" font-size="14" font-weight="300" fill="#1C1E26">The surviving form</text>
  <text x="1240" y="556" text-anchor="middle" font-size="14" font-weight="400" fill="#2E6B4E">owned delivery.</text>

  <!-- Survival annotation -->
  <rect x="1090" y="592" width="300" height="48" rx="4" fill="#D2EBE2" stroke="#2E6B4E" stroke-width="0.75"/>
  <text x="1240" y="613" text-anchor="middle" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1">SAME DYNAMIC</text>
  <text x="1240" y="631" text-anchor="middle" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1">IS REPEATING NOW</text>

  <!-- "Today: Wave 2" arrow extending right from the timeline -->
  <line x1="1420" y1="420" x2="1540" y2="420" stroke="#2E6B4E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="1510" y="410" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1">WAVE 2</text>

  <!-- Source note -->
  <line x1="0" y1="746" x2="1600" y2="746" stroke="#CAC7BF" stroke-width="0.5"/>
  <text x="90" y="766" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Source: Wolpers SM enrollment longitudinal study (High) · Cessan QE/QT mechanism (Medium-High)</text>
  <text x="90" y="784" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Scrum Alliance 18% dedicated-role demand figure · Full data in Appendix Slide 30</text>

  <!-- Footer -->
  <line x1="0" y1="858" x2="1600" y2="858" stroke="#CAC7BF" stroke-width="0.5"/>
  <text x="90" y="878" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Slide 09 · hybrid-delivery deck</text>
</svg>
