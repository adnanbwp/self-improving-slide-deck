<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 66 1600 792" width="1600" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
      text { font-family: Jost, system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F8F5EE"/>

  <!-- Header band -->
  <rect width="1600" height="66" fill="#EDE8DF"/>
  <text x="90" y="29" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="2">SLIDE 24  ·  ACTION PATH</text>
  <text x="90" y="52" font-size="17" font-weight="300" fill="#1C1E26">Three horizons. One squad. Start from inside the delivery team, not from a mandate.</text>

  <!-- ═══════════════════════════════════════ COLUMN 1: THIS WEEK ═══════════════════════════════════════ -->

  <!-- Top accent bar -->
  <rect x="90" y="90" width="412" height="5" rx="2" fill="#2E6B4E"/>

  <!-- Horizon label -->
  <text x="90" y="122" class="mono" font-size="12" fill="#2E6B4E" letter-spacing="2">THIS WEEK</text>

  <!-- Title -->
  <text x="90" y="168" font-size="30" font-weight="300" fill="#1C1E26">Redesign</text>
  <text x="90" y="204" font-size="30" font-weight="300" fill="#1C1E26">one ceremony</text>

  <line x1="90" y1="226" x2="462" y2="226" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- Content items -->
  <text x="90" y="258" font-size="16" font-weight="300" fill="#1C1E26">Pick the Daily Scrum</text>
  <text x="90" y="284" font-size="16" font-weight="300" fill="#1C1E26">Add: agent log review</text>
  <text x="90" y="310" font-size="16" font-weight="300" fill="#1C1E26">Ask: what deviated?</text>
  <text x="90" y="336" font-size="16" font-weight="300" fill="#1C1E26">Escalate: one decision only</text>

  <line x1="90" y1="360" x2="462" y2="360" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- Effort badge -->
  <rect x="90" y="378" width="128" height="32" rx="4" fill="#EDE8DF"/>
  <text x="154" y="399" text-anchor="middle" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">ONE STANDUP</text>

  <line x1="90" y1="430" x2="462" y2="430" stroke="#CAC7BF" stroke-width="0.5"/>

  <!-- Why it matters -->
  <text x="90" y="458" font-size="14" font-weight="300" fill="#6A6C7A">Small ceremony change.</text>
  <text x="90" y="480" font-size="14" font-weight="300" fill="#6A6C7A">Large accountability signal.</text>

  <!-- ═══════════════════════════════════════ COLUMN 2: THIS MONTH ═══════════════════════════════════════ -->

  <!-- Column separator -->
  <line x1="550" y1="80" x2="550" y2="730" stroke="#CAC7BF" stroke-width="0.5"/>

  <!-- Top accent bar -->
  <rect x="594" y="90" width="412" height="5" rx="2" fill="#2E6B4E"/>

  <!-- Horizon label -->
  <text x="594" y="122" class="mono" font-size="12" fill="#2E6B4E" letter-spacing="2">THIS MONTH</text>

  <!-- Title -->
  <text x="594" y="168" font-size="30" font-weight="300" fill="#1C1E26">Locate the squad</text>
  <text x="594" y="204" font-size="30" font-weight="300" fill="#1C1E26">on the ladder</text>

  <line x1="594" y1="226" x2="966" y2="226" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- Content items -->
  <text x="594" y="258" font-size="16" font-weight="300" fill="#1C1E26">Use the L1–L4 locator (Slide 20)</text>
  <text x="594" y="284" font-size="16" font-weight="300" fill="#1C1E26">Map one workflow to a HITL pattern</text>
  <text x="594" y="310" font-size="16" font-weight="300" fill="#1C1E26">Scope one agent's permissions</text>
  <text x="594" y="336" font-size="16" font-weight="300" fill="#1C1E26">Document one approval gate</text>

  <line x1="594" y1="360" x2="966" y2="360" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- Effort badge -->
  <rect x="594" y="378" width="110" height="32" rx="4" fill="#EDE8DF"/>
  <text x="649" y="399" text-anchor="middle" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">ONE SPRINT</text>

  <line x1="594" y1="430" x2="966" y2="430" stroke="#CAC7BF" stroke-width="0.5"/>

  <!-- Why it matters -->
  <text x="594" y="458" font-size="14" font-weight="300" fill="#6A6C7A">Squad diagnostic. First governance</text>
  <text x="594" y="480" font-size="14" font-weight="300" fill="#6A6C7A">decision owned by the IM/DM.</text>

  <!-- ═══════════════════════════════════════ COLUMN 3: THIS YEAR ═══════════════════════════════════════ -->

  <!-- Column separator -->
  <line x1="1056" y1="80" x2="1056" y2="730" stroke="#CAC7BF" stroke-width="0.5"/>

  <!-- Top accent bar -->
  <rect x="1098" y="90" width="412" height="5" rx="2" fill="#2E6B4E"/>

  <!-- Horizon label -->
  <text x="1098" y="122" class="mono" font-size="12" fill="#2E6B4E" letter-spacing="2">THIS YEAR</text>

  <!-- Title -->
  <text x="1098" y="168" font-size="30" font-weight="300" fill="#1C1E26">Build capability</text>
  <text x="1098" y="204" font-size="30" font-weight="300" fill="#1C1E26">through practice</text>

  <line x1="1098" y1="226" x2="1470" y2="226" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- Content items -->
  <text x="1098" y="258" font-size="16" font-weight="300" fill="#1C1E26">Govern agent workflows in delivery</text>
  <text x="1098" y="284" font-size="16" font-weight="300" fill="#1C1E26">Develop three credential tracks</text>
  <text x="1098" y="310" font-size="16" font-weight="300" fill="#1C1E26">PSM-AI · PMI AI Agile · AIGP</text>
  <text x="1098" y="336" font-size="16" font-weight="300" fill="#1C1E26">One sprint with agent = more than</text>
  <text x="1098" y="356" font-size="16" font-weight="300" fill="#6A6C7A">a workshop attendance</text>

  <line x1="1098" y1="376" x2="1470" y2="376" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- Effort badge -->
  <rect x="1098" y="394" width="158" height="32" rx="4" fill="#EDE8DF"/>
  <text x="1177" y="415" text-anchor="middle" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">DAILY PRACTICE</text>

  <line x1="1098" y1="446" x2="1470" y2="446" stroke="#CAC7BF" stroke-width="0.5"/>

  <!-- Why it matters -->
  <text x="1098" y="474" font-size="14" font-weight="300" fill="#6A6C7A">Bottom-up adoption is durable.</text>
  <text x="1098" y="496" font-size="14" font-weight="300" fill="#6A6C7A">Top-down mandate is not.</text>

  <!-- ═══ Horizon connector (subtle arrow below accent bars) ═══ -->
  <line x1="90" y1="82" x2="1510" y2="82" stroke="#CAC7BF" stroke-width="0.75"/>
  <polygon points="1498,77 1514,82 1498,87" fill="#CAC7BF"/>

  <!-- ═══ Counter-example note ═══ -->
  <line x1="0" y1="744" x2="1600" y2="744" stroke="#CAC7BF" stroke-width="0.5"/>
  <text x="90" y="768" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Counter-example: Salesforce Agentforce mandate achieved only 8% adoption (bosio.digital).</text>
  <text x="90" y="786" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Champion model: 68% adoption. Change from inside the delivery team is the model, not top-down CoE rollout.</text>

  <!-- Footer -->
  <line x1="0" y1="858" x2="1600" y2="858" stroke="#CAC7BF" stroke-width="0.5"/>
  <text x="90" y="878" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Slide 24 · hybrid-delivery deck</text>
</svg>
