<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
      text { font-family: Jost, system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F8F5EE"/>

  <!-- Header band -->
  <rect width="1600" height="66" fill="#EDE8DF"/>
  <text x="90" y="29" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="2">SLIDE 15  ·  THE MECHANISM</text>
  <text x="90" y="52" font-size="17" font-weight="300" fill="#1C1E26">The IM/DM decides which pattern. The agent can't.</text>

  <!-- Column separators -->
  <line x1="558" y1="66" x2="558" y2="870" stroke="#CAC7BF" stroke-width="0.75"/>
  <line x1="1074" y1="66" x2="1074" y2="870" stroke="#CAC7BF" stroke-width="0.75"/>

  <!-- ════════════════════════════ COLUMN 1: AI Drafts → Human Reviews ════════════════════════════ -->
  <text x="90" y="112" class="mono" font-size="11" fill="#2E6B4E" letter-spacing="2">01</text>
  <text x="90" y="150" font-size="28" font-weight="300" fill="#1C1E26">AI Drafts</text>
  <text x="90" y="183" font-size="28" font-weight="300" fill="#1C1E26">→ Human Reviews</text>

  <!-- Actor box: AI Agent (jade tint) -->
  <rect x="118" y="222" width="252" height="68" rx="5" fill="#D2EBE2" stroke="#2E6B4E" stroke-width="1.25"/>
  <text x="244" y="250" text-anchor="middle" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1.5">AI AGENT</text>
  <text x="244" y="272" text-anchor="middle" font-size="14" font-weight="300" fill="#2E6B4E">generates draft</text>

  <!-- Arrow down -->
  <line x1="244" y1="291" x2="244" y2="362" stroke="#2E6B4E" stroke-width="1.5"/>
  <polygon points="234,358 254,358 244,376" fill="#2E6B4E"/>
  <text x="260" y="330" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">output</text>

  <!-- Actor box: Human Review -->
  <rect x="118" y="377" width="252" height="68" rx="5" fill="#EDE8DF" stroke="#CAC7BF" stroke-width="1.25"/>
  <text x="244" y="405" text-anchor="middle" class="mono" font-size="10" fill="#1C1E26" letter-spacing="1.5">HUMAN</text>
  <text x="244" y="427" text-anchor="middle" font-size="14" font-weight="300" fill="#1C1E26">reviews &amp; approves</text>

  <!-- USE section -->
  <line x1="90" y1="475" x2="520" y2="475" stroke="#CAC7BF" stroke-width="0.75"/>
  <text x="90" y="498" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1.5">USE</text>
  <text x="90" y="520" font-size="15" font-weight="300" fill="#1C1E26">code · docs · plans</text>

  <!-- IM ROLE section -->
  <line x1="90" y1="548" x2="520" y2="548" stroke="#CAC7BF" stroke-width="0.75"/>
  <text x="90" y="571" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1.5">IM ROLE</text>
  <text x="90" y="595" font-size="15" font-weight="300" fill="#2E6B4E">Define review gates in</text>
  <text x="90" y="618" font-size="15" font-weight="300" fill="#2E6B4E">Definition of Done</text>

  <!-- ════════════════════════════ COLUMN 2: Human Steers → AI Executes ════════════════════════════ -->
  <text x="606" y="112" class="mono" font-size="11" fill="#2E6B4E" letter-spacing="2">02</text>
  <text x="606" y="150" font-size="28" font-weight="300" fill="#1C1E26">Human Steers</text>
  <text x="606" y="183" font-size="28" font-weight="300" fill="#1C1E26">→ AI Executes</text>

  <!-- Actor box: Human -->
  <rect x="632" y="222" width="252" height="68" rx="5" fill="#EDE8DF" stroke="#CAC7BF" stroke-width="1.25"/>
  <text x="758" y="250" text-anchor="middle" class="mono" font-size="10" fill="#1C1E26" letter-spacing="1.5">HUMAN</text>
  <text x="758" y="272" text-anchor="middle" font-size="14" font-weight="300" fill="#1C1E26">steers direction</text>

  <!-- Arrow down -->
  <line x1="758" y1="291" x2="758" y2="362" stroke="#2E6B4E" stroke-width="1.5"/>
  <polygon points="748,358 768,358 758,376" fill="#2E6B4E"/>
  <text x="774" y="330" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">direction</text>

  <!-- Actor box: AI Executes -->
  <rect x="632" y="377" width="252" height="68" rx="5" fill="#D2EBE2" stroke="#2E6B4E" stroke-width="1.25"/>
  <text x="758" y="405" text-anchor="middle" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1.5">AI AGENT</text>
  <text x="758" y="427" text-anchor="middle" font-size="14" font-weight="300" fill="#2E6B4E">executes at scale</text>

  <!-- USE section -->
  <line x1="606" y1="475" x2="1040" y2="475" stroke="#CAC7BF" stroke-width="0.75"/>
  <text x="606" y="498" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1.5">USE</text>
  <text x="606" y="520" font-size="15" font-weight="300" fill="#1C1E26">complex analysis · research</text>

  <!-- IM ROLE section -->
  <line x1="606" y1="548" x2="1040" y2="548" stroke="#CAC7BF" stroke-width="0.75"/>
  <text x="606" y="571" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1.5">IM ROLE</text>
  <text x="606" y="595" font-size="15" font-weight="300" fill="#2E6B4E">Maintain task backlog</text>
  <text x="606" y="618" font-size="15" font-weight="300" fill="#2E6B4E">agents pull from</text>

  <!-- ════════════════════════════ COLUMN 3: AI Monitors → Human Intervenes ════════════════════════════ -->
  <text x="1122" y="112" class="mono" font-size="11" fill="#2E6B4E" letter-spacing="2">03</text>
  <text x="1122" y="150" font-size="28" font-weight="300" fill="#1C1E26">AI Monitors</text>
  <text x="1122" y="183" font-size="28" font-weight="300" fill="#1C1E26">→ Human Intervenes</text>

  <!-- Actor box: AI Monitor -->
  <rect x="1148" y="222" width="252" height="68" rx="5" fill="#D2EBE2" stroke="#2E6B4E" stroke-width="1.25"/>
  <text x="1274" y="250" text-anchor="middle" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1.5">AI MONITOR</text>
  <text x="1274" y="272" text-anchor="middle" font-size="14" font-weight="300" fill="#2E6B4E">monitors continuously</text>

  <!-- Arrow down (alert signal) -->
  <line x1="1274" y1="291" x2="1274" y2="362" stroke="#2E6B4E" stroke-width="1.5"/>
  <polygon points="1264,358 1284,358 1274,376" fill="#2E6B4E"/>
  <text x="1290" y="323" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">alert on</text>
  <text x="1290" y="338" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">threshold</text>

  <!-- Actor box: Human Intervenes -->
  <rect x="1148" y="377" width="252" height="68" rx="5" fill="#EDE8DF" stroke="#CAC7BF" stroke-width="1.25"/>
  <text x="1274" y="405" text-anchor="middle" class="mono" font-size="10" fill="#1C1E26" letter-spacing="1.5">HUMAN</text>
  <text x="1274" y="427" text-anchor="middle" font-size="14" font-weight="300" fill="#1C1E26">intervenes on deviation</text>

  <!-- USE section -->
  <line x1="1122" y1="475" x2="1558" y2="475" stroke="#CAC7BF" stroke-width="0.75"/>
  <text x="1122" y="498" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1.5">USE</text>
  <text x="1122" y="520" font-size="15" font-weight="300" fill="#1C1E26">ops · alerts · QA</text>

  <!-- IM ROLE section -->
  <line x1="1122" y1="548" x2="1558" y2="548" stroke="#CAC7BF" stroke-width="0.75"/>
  <text x="1122" y="571" class="mono" font-size="10" fill="#2E6B4E" letter-spacing="1.5">IM ROLE</text>
  <text x="1122" y="595" font-size="15" font-weight="300" fill="#2E6B4E">Set escalation thresholds</text>

  <!-- ════════════════════════════ Annotation note ════════════════════════════ -->
  <line x1="0" y1="660" x2="1600" y2="660" stroke="#CAC7BF" stroke-width="0.5"/>
  <text x="90" y="688" font-size="14" font-weight="300" fill="#6A6C7A" font-style="italic">Pattern selection is workflow design — not an AI-augmented decision. The IM/DM selects the pattern</text>
  <text x="90" y="710" font-size="14" font-weight="300" fill="#6A6C7A" font-style="italic">before the work begins. This is why Malone's finding (AI degrades decision tasks) does not apply here.</text>

  <!-- Footer -->
  <line x1="0" y1="858" x2="1600" y2="858" stroke="#CAC7BF" stroke-width="0.5"/>
  <text x="90" y="878" class="mono" font-size="10" fill="#6A6C7A" letter-spacing="1">Source: LangGraph documentation · DEV Community HITL taxonomy · Anthropic Trustworthy Agents</text>
</svg>
